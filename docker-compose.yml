# =============================================================================
# SERVER AI MONITORING - Docker Compose
# =============================================================================
# Usage:
#   cp .env.example .env && nano .env
#   docker compose up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MCP Monitoring Server (READ-ONLY)
  # ---------------------------------------------------------------------------
  mcp-monitoring:
    build:
      context: ./mcp-monitoring
      dockerfile: Dockerfile
    container_name: mcp-monitoring
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MCP_SERVER_PORT: ${MCP_SERVER_PORT:-9000}
      MCP_LOG_LEVEL: ${MCP_LOG_LEVEL:-info}
      POSTGRES_MONITOR_HOST: ${POSTGRES_MONITOR_HOST}
      POSTGRES_MONITOR_PORT: ${POSTGRES_MONITOR_PORT:-5432}
      POSTGRES_MONITOR_DB: ${POSTGRES_MONITOR_DB:-postgres}
      POSTGRES_MONITOR_USER: ${POSTGRES_MONITOR_USER}
      POSTGRES_MONITOR_PASSWORD: ${POSTGRES_MONITOR_PASSWORD}
      RABBITMQ_MONITOR_HOST: ${RABBITMQ_MONITOR_HOST}
      RABBITMQ_MONITOR_PORT: ${RABBITMQ_MONITOR_PORT:-15672}
      RABBITMQ_MONITOR_USER: ${RABBITMQ_MONITOR_USER}
      RABBITMQ_MONITOR_PASSWORD: ${RABBITMQ_MONITOR_PASSWORD}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID}
      EMAIL_WHITELIST: ${EMAIL_WHITELIST}
    volumes:
      # READ-ONLY host mounts for observability
      - /var/log:/host_logs:ro
      - /proc:/host_proc:ro
      - /sys:/host_sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9000:9000"
    networks:
      - infra_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    read_only: false   # app writes to its own /tmp only; host mounts are :ro
    tmpfs:
      - /tmp:size=50m,mode=1777

  # ---------------------------------------------------------------------------
  # OpenClaw - AI Agent with MCP support
  # ---------------------------------------------------------------------------
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    environment:
      # OpenClaw reads its config from /home/node/openclaw.json
      OPENCLAW_CONFIG_PATH: /home/node/openclaw.json
      # Gateway token must match what's inside openclaw.json
      OPENCLAW_GATEWAY_TOKEN: ccca5288d47247abee7fbaac3b08abe24134f2791948261c
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      IS_CREATED_UPDATE: ${IS_CREATED_UPDATE:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_ENABLED: "false"
      DISCORD_ALERT_CHANNEL_ID: ${DISCORD_ALERT_CHANNEL_ID:-}
    command: >
      sh -c "
      if [ \"$${IS_CREATED_UPDATE}\" = \"true\" ]; then
        export OPENCLAW_DENIED_TOOL_1='none';
        export OPENCLAW_DENIED_TOOL_2='none';
        export OPENCLAW_DENIED_TOOL_3='none';
        export OPENCLAW_DENIED_TOOL_4='none';
        export OPENCLAW_DENIED_TOOL_5='none';
        export OPENCLAW_DENIED_TOOL_6='none';
      else
        export OPENCLAW_DENIED_TOOL_1='write';
        export OPENCLAW_DENIED_TOOL_2='write_file';
        export OPENCLAW_DENIED_TOOL_3='edit';
        export OPENCLAW_DENIED_TOOL_4='edit_file';
        export OPENCLAW_DENIED_TOOL_5='apply_patch';
        export OPENCLAW_DENIED_TOOL_6='group:runtime';
      fi;
      export DISCORD_ALLOWED_USER_1='none';
      export DISCORD_ALLOWED_USER_2='none';
      export DISCORD_ALLOWED_USER_3='none';
      export DISCORD_ALLOWED_USER_4='none';
      export DISCORD_ALLOWED_USER_5='none';
      i=1;
      OLD_IFS=\"$$IFS\";
      IFS=',';
      for user in $$DISCORD_ALLOWED_USERS; do
        if [ $$i -le 5 ]; then
          export DISCORD_ALLOWED_USER_$$i=\"$$user\";
        fi;
        i=$$((i+1));
      done;
      IFS=\"$$OLD_IFS\";
      node /home/node/.openclaw/generate-config.js;
      exec node openclaw.mjs gateway --allow-unconfigured --bind lan
      "
    volumes:
      # Mount config dir to the path OpenClaw expects: /home/node/.openclaw
      - ./openclaw/config:/home/node/.openclaw
    ports:
      - "${OPENCLAW_PORT:-9001}:9001"
    networks:
      - infra_net
    depends_on:
      mcp-monitoring:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:9001/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  # ---------------------------------------------------------------------------
  # Discord Bot Service
  # ---------------------------------------------------------------------------
  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    container_name: discord-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_ALERT_CHANNEL_ID: ${DISCORD_ALERT_CHANNEL_ID}
      DISCORD_ADMIN_USERS: ${DISCORD_ADMIN_USERS}
      OPENCLAW_API_URL: http://openclaw:9001
      OPENCLAW_GATEWAY_TOKEN: ccca5288d47247abee7fbaac3b08abe24134f2791948261c
      EMAIL_WHITELIST: ${EMAIL_WHITELIST}
    volumes:
      - ./storage:/app/storage
    depends_on:
      openclaw:
        condition: service_healthy
    networks:
      - infra_net

  # ---------------------------------------------------------------------------
  # Qdrant Vector Database for HR
  # ---------------------------------------------------------------------------
  qdrant-hr:
    image: qdrant/qdrant:latest
    container_name: qdrant-hr
    restart: unless-stopped
    ports:
      - "9005:6333"
    volumes:
      - ./storage/qdrant_hr:/qdrant/storage
    networks:
      - infra_net

  # ---------------------------------------------------------------------------
  # HR Assistant Service
  # ---------------------------------------------------------------------------
  hr-assistant:
    build:
      context: ./hr-assistant
      dockerfile: Dockerfile
    container_name: hr-assistant
    restart: unless-stopped
    ports:
      - "9004:9004"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 9004
      QDRANT_URL: http://qdrant-hr:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - ./documents:/documents
    depends_on:
      - qdrant-hr
    networks:
      - infra_net

networks:
  infra_net:
    external: true
    name: infra_net
