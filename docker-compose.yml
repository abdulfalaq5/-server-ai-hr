# =============================================================================
# SERVER AI MONITORING - Docker Compose
# =============================================================================
# Usage:
#   cp .env.example .env && nano .env
#   docker compose up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Discord Bot Service (HR Assistant interface)
  # ---------------------------------------------------------------------------
  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    container_name: discord-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_ALERT_CHANNEL_ID: ${DISCORD_ALERT_CHANNEL_ID}
      DISCORD_ADMIN_USERS: ${DISCORD_ADMIN_USERS}
      EMAIL_WHITELIST: ${EMAIL_WHITELIST}
    volumes:
      - ./storage:/app/storage
    networks:
      - infra_net

  # ---------------------------------------------------------------------------
  # Qdrant Vector Database for HR
  # ---------------------------------------------------------------------------
  qdrant-hr:
    image: qdrant/qdrant:latest
    container_name: qdrant-hr
    restart: unless-stopped
    ports:
      - "9005:6333"
    volumes:
      - ./storage/qdrant_hr:/qdrant/storage
    networks:
      - infra_net

  # ---------------------------------------------------------------------------
  # HR Assistant Service
  # ---------------------------------------------------------------------------
  hr-assistant:
    build:
      context: ./hr-assistant
      dockerfile: Dockerfile
    container_name: hr-assistant
    restart: unless-stopped
    ports:
      - "9004:9004"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 9004
      QDRANT_URL: http://qdrant-hr:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - ./documents:/documents
    depends_on:
      - qdrant-hr
    networks:
      - infra_net

networks:
  infra_net:
    external: true
    name: infra_net
